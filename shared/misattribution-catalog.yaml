# misattribution-catalog.yaml
# Canonical catalog of causal-inference citation traps for the TETS papers.md generator.
# Seeded 2026-05-25 from citation-audit/honest-did/papers.md cross-paper attribution map
# plus the CAPABILITY-05 spec misattribution-traps list.
#
# Entries are the IP / moat layer of CAP-05. Accuracy beats completeness.
# Every entry carries source-of-claim citations. Entries with unresolved DOIs
# carry "TODO: verify DOI" markers; the closest-known identifier (arXiv, NBER WP)
# is retained so the misattribution-trap engine can still match by surface form.
#
# Schema (per entry):
#   wrong_credit:   {authors, year, doi (nullable), surface_forms}
#   correct_credit: {authors, year, doi (nullable), section}
#   method:         the named procedure or claim being misattributed
#   evidence:       observation context for this trap
#   confidence_level: consensus | strong | provisional
#   sources_of_claim: list of authoritative sources that document the correct credit
#   last_reviewed_by: initials
#   last_reviewed_date: ISO date
#   catalog_version: semver

catalog_version: "1.0"
last_reviewed_by: "V. Cholette"
last_reviewed_date: 2026-05-25


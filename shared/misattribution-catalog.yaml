      year: 2019
      doi: "10.3386/w26463"
      arxiv_id: "1603.09326"
      journal_doi: "10.1093/restud/rdaf087"
      section: "NBER WP 26463 (2019); journal publication ReStud 2025"
    method: "surrogate index estimator"
    evidence: "The three-author Athey-Chetty-Imbens 2020 paper (arXiv 2006.09676, 'Using Experiments to Correct for Selection in Observational Studies', informally called the ESC paper) is a distinct method addressing experimental selection correction, not the surrogate index. The surrogate index estimator proper is the four-author Athey-Chetty-Imbens-Kang paper (NBER WP 26463, 2019; arXiv 1603.09326 origin 2016; published 2025 in Review of Economic Studies as 'The Surrogate Index: Combining Short-Term Proxies to Estimate Long-Term Treatment Effects More Rapidly and Precisely')."
    confidence_level: consensus
    sources_of_claim:
      - "Pillar workflow doc 2026-05-25 misattribution-traps line 86"
      - "NBER WP 26463 / 10.3386/w26463 (Athey, Chetty, Imbens & Kang 2019)"
      - "ReStud 2025 publication 10.1093/restud/rdaf087"
      - "arXiv 2006.09676 (Athey, Chetty, Imbens 2020, three-author paper)"
    verification_notes: "Verified via CrossRef and arXiv 2026-05-25. The catalog originally branded the three-author paper as 'Estimating Surrogacy Coefficients (ESC)'; the actual paper title is 'Using Experiments to Correct for Selection in Observational Studies'. A 2025 NBER follow-up by the same three authors carries DOI 10.3386/w33817 ('The Experimental Selection Correction Estimator'). The ESC label is informal community shorthand, not the paper's title."
    last_reviewed_by: "V. Cholette"
    last_reviewed_date: 2026-05-25

